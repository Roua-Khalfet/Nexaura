version: "3.9"

services:
  # Startify Django Backend (ComplianceGuard)
  startify-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: startify-backend
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
      - DATABASE_URL=sqlite:///db.sqlite3
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    volumes:
      - ./backend:/app
      - startify-static:/app/staticfiles
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    networks:
      - startify-network

  # TeamBuilder Django Backend
  teambuilder-backend:
    build:
      context: ./teambuilder-backend
      dockerfile: Dockerfile
    container_name: teambuilder-backend
    ports:
      - "8001:8000"
    environment:
      - SECRET_KEY=${TB_SECRET_KEY:-django-insecure-teambuilder-dev-key}
      - DEBUG=${TB_DEBUG:-True}
      - DATABASE_URL=postgresql://tb_user:tb_pass@teambuilder-postgres:5432/teambuilder
      - REDIS_URL=redis://teambuilder-redis:6379/0
      - ALLOWED_HOSTS=*
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse:3000}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@teambuilder.tn}
    volumes:
      - ./teambuilder-backend:/app
      - teambuilder-media:/app/media
    depends_on:
      teambuilder-postgres:
        condition: service_healthy
      teambuilder-redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - startify-network

  # PostgreSQL for TeamBuilder
  teambuilder-postgres:
    image: postgres:16-alpine
    container_name: teambuilder-postgres
    environment:
      POSTGRES_DB: teambuilder
      POSTGRES_USER: tb_user
      POSTGRES_PASSWORD: tb_pass
    volumes:
      - teambuilder-pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Different port to avoid conflicts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tb_user -d teambuilder"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - startify-network

  # Redis for TeamBuilder
  teambuilder-redis:
    image: redis:7-alpine
    container_name: teambuilder-redis
    ports:
      - "6380:6379"  # Different port to avoid conflicts
    restart: unless-stopped
    networks:
      - startify-network

  # Neo4j for Startify (ComplianceGuard)
  neo4j:
    image: neo4j:5.15.0
    container_name: startify-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password123}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_max__size=2G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-password123} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - startify-network

  # Qdrant for Startify (ComplianceGuard)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: startify-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    networks:
      - startify-network

  # Langfuse PostgreSQL (Optional - for LLM observability)
  langfuse-db:
    image: postgres:16-alpine
    container_name: langfuse-postgres
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse_user
      POSTGRES_PASSWORD: langfuse_pass
    volumes:
      - langfuse-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - startify-network
    profiles:
      - langfuse

  # Langfuse (Optional - for LLM observability)
  langfuse:
    image: ghcr.io/langfuse/langfuse:latest
    container_name: langfuse
    ports:
      - "3001:3000"  # Different port to avoid conflicts with frontend
    environment:
      DATABASE_URL: postgresql://langfuse_user:langfuse_pass@langfuse-db/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-changeme-in-production}
      NEXTAUTH_URL: http://localhost:3001
      SALT: ${LANGFUSE_SALT:-changeme-in-production}
    depends_on:
      - langfuse-db
    restart: unless-stopped
    networks:
      - startify-network
    profiles:
      - langfuse

volumes:
  startify-static:
  teambuilder-pgdata:
  teambuilder-media:
  neo4j-data:
  neo4j-logs:
  qdrant-data:
  langfuse-pgdata:

networks:
  startify-network:
    driver: bridge
